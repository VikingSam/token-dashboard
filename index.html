<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viking Token Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0f18; color: #c9d1e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 28px 32px; }
    h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
    .sub { color: #8892a4; font-size: 13px; margin-bottom: 24px; }
    .updated { color: #4ade80; font-size: 12px; margin-top: 4px; }
    .kpi-grid { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
    .kpi { background: #1a1f2e; border-radius: 10px; padding: 18px 22px; flex: 1; min-width: 140px; text-align: center; border: 1px solid #2a3040; }
    .kv { font-size: 28px; font-weight: 700; }
    .kl { font-size: 11px; color: #8892a4; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .card { background: #161b27; border-radius: 10px; padding: 20px; margin-bottom: 24px; overflow-x: auto; }
    .card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 9px 8px; text-align: left; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #2a3040; }
    td { padding: 10px 8px; border-bottom: 1px solid #1e2330; }
    .bar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
    .bar-label { font-size: 10px; color: #666; }
    .bar-val { font-size: 10px; color: #888; }
    #loading { text-align: center; padding: 60px; color: #555; font-size: 16px; }
    #error { text-align: center; padding: 60px; color: #ef4444; }
  </style>
</head>
<body>
  <h1>🔪 Viking Token Spend</h1>
  <div class="sub">Live data — fetched fresh on every load</div>
  <div class="updated" id="updated-time">Loading...</div>

  <div id="loading">Fetching live data...</div>
  <div id="error" style="display:none"></div>
  <div id="dashboard" style="display:none"></div>

<script>
const API = 'http://100.90.244.61:8891/api/token-costs';

const KEY_MAP = {
  'Blade': 'Blade', 'Blade2': 'Blade',
  'Sheath': 'Sheath', 'Frank': 'Frank',
  'Ember': 'Ember', 'Bubba': 'Bubba'
};
const AGENTS = ['Blade', 'Sheath', 'Frank', 'Ember', 'Bubba'];
const COLORS = { Blade: '#ff6b35', Sheath: '#0bb4a0', Frank: '#9b59b6', Ember: '#c7161e', Bubba: '#e8a838' };

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function fmtMoney(n) {
  return '$' + n.toFixed(2);
}

async function loadAndRender() {
  try {
    const res = await fetch(API + '?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);

    // Aggregate by date + agent
    const byDateAgent = {};
    for (const row of rows) {
      const d = (row['usage_date_utc'] || '').slice(0, 10);
      if (!d) continue;
      const agent = KEY_MAP[row['api_key']] || row['api_key'] || 'Unknown';
      const cost = parseFloat(row['cost_usd'] || 0);
      if (!byDateAgent[d]) byDateAgent[d] = {};
      byDateAgent[d][agent] = (byDateAgent[d][agent] || 0) + cost;
    }

    const dates = Object.keys(byDateAgent).sort().reverse();
    const todayStr = today();
    const todayData = byDateAgent[todayStr] || {};
    const todayTotal = Object.values(todayData).reduce((a, b) => a + b, 0);

    // Yesterday
    const yd = new Date(); yd.setDate(yd.getDate() - 1);
    const ydStr = yd.toISOString().slice(0, 10);
    const ydData = byDateAgent[ydStr] || {};
    const ydTotal = Object.values(ydData).reduce((a, b) => a + b, 0);

    // 7-day total
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
    const weekTotal = dates.filter(d => new Date(d) >= cutoff).reduce((sum, d) => {
      return sum + Object.values(byDateAgent[d]).reduce((a, b) => a + b, 0);
    }, 0);

    // Render KPIs
    const todayColor = todayTotal > 75 ? '#ef4444' : todayTotal > 30 ? '#f59e0b' : '#22c55e';
    const kpis = `
      <div class="kpi-grid">
        <div class="kpi"><div class="kv" style="color:${todayColor}">${fmtMoney(todayTotal)}</div><div class="kl">Today So Far</div></div>
        ${AGENTS.map(a => `<div class="kpi"><div class="kv" style="color:${COLORS[a]}">${fmtMoney(todayData[a]||0)}</div><div class="kl">${a}</div></div>`).join('')}
        <div class="kpi"><div class="kv" style="color:#8892a4">${fmtMoney(ydTotal)}</div><div class="kl">Yesterday</div></div>
        <div class="kpi"><div class="kv" style="color:#60a5fa">${fmtMoney(weekTotal)}</div><div class="kl">7-Day Total</div></div>
      </div>`;

    // Bar chart (last 14 days)
    const chartDates = dates.slice(0, 14).reverse();
    const maxVal = Math.max(...chartDates.map(d => Object.values(byDateAgent[d]).reduce((a,b)=>a+b,0)), 1);
    const bars = chartDates.map(d => {
      const total = Object.values(byDateAgent[d]).reduce((a,b)=>a+b,0);
      const h = Math.max(4, Math.round((total / maxVal) * 110));
      const isToday = d === todayStr;
      const color = isToday ? '#22c55e' : total > 150 ? '#ef4444' : total > 75 ? '#f59e0b' : '#ff6b35';
      const label = d.slice(5).replace('-', '/');
      return `<div class="bar-col"><div class="bar-val">${fmtMoney(total)}</div><div class="bar" style="height:${h}px;background:${color}"></div><div class="bar-label">${label}${isToday?' ◀':''}</div></div>`;
    }).join('');

    // Table (last 14 days)
    const tableRows = dates.slice(0, 14).map(d => {
      const data = byDateAgent[d];
      const total = Object.values(data).reduce((a,b)=>a+b,0);
      const isToday = d === todayStr;
      const bg = isToday ? 'background:#1e2e1e' : '';
      return `<tr style="${bg}">
        <td style="color:#fff;font-weight:${isToday?'700':'400'}">${d}${isToday?' ← Today':''}</td>
        ${AGENTS.map(a => `<td style="color:${COLORS[a]}">${fmtMoney(data[a]||0)}</td>`).join('')}
        <td style="font-weight:700;color:${total>150?'#ef4444':total>75?'#f59e0b':'#c9d1e0'}">${fmtMoney(total)}</td>
      </tr>`;
    }).join('');

    const now = new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true, month: 'short', day: 'numeric' });

    document.getElementById('updated-time').textContent = 'Data fetched: ' + now + ' CST (live — no cache)';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dashboard').innerHTML = `
      ${kpis}
      <div class="card">
        <div class="card-title">14-Day Spend History</div>
        <div class="bar-wrap">${bars}</div>
      </div>
      <div class="card">
        <div class="card-title">Daily Breakdown by Agent</div>
        <table>
          <thead><tr><th>Date</th>${AGENTS.map(a=>`<th style="color:${COLORS[a]}">${a}</th>`).join('')}<th>Total</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>`;
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Failed to load data: ' + e.message;
  }
}

loadAndRender();
</script>
</body>
</html>
